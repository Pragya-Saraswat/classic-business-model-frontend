<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Orders</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar('customer-orders')}"></aside>
    <div class="main-content">
        <header class="topbar">
            <div class="topbar-title">Customer Orders <small><code style="color:var(--gold)">GET /api/customers/{id}/orders</code></small></div>
            <div class="topbar-spacer"></div><div class="topbar-badge">API 6</div>
        </header>
        <div class="page-body">
            <div class="page-header animate-in">
                <h2>Customer Orders by ID</h2>
                <p>Enter a customer ID to fetch all their orders.</p>
            </div>
            <div class="filter-bar animate-in">
                <form action="/ui/customer-lookup" method="get" style="display:contents;">
                    <div class="form-field">
                        <label>Customer ID</label>
                        <input type="number" name="id" placeholder="e.g. 103" th:value="${customerId}" min="1">
                    </div>
                    <div style="display:flex;gap:.5rem;align-items:flex-end;">
                        <button type="submit" class="btn btn-primary">Fetch Orders</button>
                    </div>
                </form>
            </div>
            <div th:if="${error}" class="alert alert-danger animate-in" th:text="${error}"></div>
            <div th:if="${orders != null and #lists.isEmpty(orders)}" class="empty-state">
                ><h3>No orders found for customer <span th:text="${customerId}"></span></h3>
            </div>
            <div th:if="${orders != null and !#lists.isEmpty(orders)}" class="table-container animate-in">
                <div class="table-toolbar">
                    <span class="table-toolbar-title">Orders for Customer #<span th:text="${customerId}"></span></span>
                    <span class="badge badge-emerald" th:text="${#lists.size(orders)} + ' orders'"></span>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Order #</th><th>Order Date</th><th>Required Date</th><th>Shipped Date</th><th>Status</th><th>Comments</th></tr></thead>
                        <tbody>
                        <tr th:each="o : ${orders}">
                            <td class="text-gold font-mono"
                                th:text="${o['orderNumber'] != null} ? ${o['orderNumber']} : ${o['id']}"></td>
                            <td th:text="${o['orderDate'] != null} ? ${o['orderDate']} : '—'"></td>
                            <td th:text="${o['requiredDate'] != null} ? ${o['requiredDate']} : '—'"></td>
                            <td th:text="${o['shippedDate'] != null} ? ${o['shippedDate']} : '—'"></td>
                            <td>
      <span class="badge badge-default"
            th:text="${o['status'] != null} ? ${o['status']} : '—'"></span>
                            </td>
                            <td class="text-muted text-sm"
                                th:text="${o['comments'] != null} ? ${o['comments']} : '—'"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
